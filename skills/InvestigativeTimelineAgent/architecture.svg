<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #2C2C2A; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }

    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #3C3489; }
    .c-purple .ts  { fill: #534AB7; }

    .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th   { fill: #712B13; }
    .c-coral .ts   { fill: #993C1D; }

    .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th    { fill: #085041; }
    .c-teal .ts    { fill: #0F6E56; }

    .c-green rect  { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .th   { fill: #27500A; }
    .c-green .ts   { fill: #3B6D11; }

    .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th    { fill: #444441; }
    .c-gray .ts    { fill: #5F5E5A; }

    line, path.arr { stroke: #888780; }
  </style>
</defs>

<!-- ── INPUTS ── -->
<g class="c-gray">
  <rect x="30" y="100" width="150" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="105" y="121" text-anchor="middle" dominant-baseline="central">Query</text>
  <text class="ts" x="105" y="141" text-anchor="middle" dominant-baseline="central">follow leads</text>
</g>

<g class="c-gray">
